<!doctype html>
<html lang="ja">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&display=swap" rel="stylesheet">
    <link href="assets/css/global.css" rel="stylesheet">
    <title>ミライズ</title>
</head>
<body class="d-flex flex-column vh-100">
<header class="bg-dark py-3 mb-4">
    <div class="container d-flex flex-wrap justify-content-between">
        <a href="./" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none flex-row">
            <img src="assets/images/logo_white.png" class="bi me-2" width="60" alt="ミライズ">
            <span class="fs-2 miraizu">Miraizu</span>
        </a>
        <ul class="nav nav-pills">
            <li class="nav-item"><a href="./" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
            <li class="nav-item"><a href="achieve.html" class="nav-link">Achieve</a></li>
            <li class="nav-item"><a href="contact.html" class="nav-link active" aria-current="page">Contact</a></li>
        </ul>
    </div>
</header>
<main class="flex-fill flex-grow-1 container">
    <h2>お問い合わせ</h2>
    <form action="" method="post">
        <div class="row mb-3">
            <label for="input-group-name" class="col-sm-2 col-form-label">企業・団体名</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="input-group-name">
            </div>
        </div>
        <div class="row mb-3">
            <label for="input-name" class="col-sm-2 col-form-label">お名前</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="input-name">
            </div>
        </div>
        <div class="row mb-3">
            <label for="input-tel" class="col-sm-2 col-form-label">電話番号</label>
            <div class="col-sm-10">
                <input type="tel" class="form-control" id="input-tel">
            </div>
        </div>
        <div class="row mb-3">
            <label for="input-mail" class="col-sm-2 col-form-label">メールアドレス</label>
            <div class="col-sm-10">
                <input type="email" class="form-control" id="input-mail">
            </div>
        </div>
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">ご連絡先</label>
            <div class="col-sm-10">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2" checked>
                    <label class="form-check-label" for="inlineRadio2">メール</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                    <label class="form-check-label" for="inlineRadio1">電話</label>
                </div>
            </div>
        </div>
        <div class="row mb-3">
            <label for="input-type" class="col-sm-2 col-form-label">ご依頼内容</label>
            <div class="col-sm-10">
                <input class="form-control" list="type-list" id="input-type">
                <datalist id="type-list">
                    <option>Webサイト構築</option>
                    <option>Webシステム構築</option>
                    <option>スマホアプリ構築</option>
                    <option>開発補助</option>
                    <option>サーバー構築</option>
                    <option>その他</option>
                </datalist>
            </div>
        </div>
        <div class="row mb-3">
            <label for="input-content" class="col-sm-2 col-form-label">メールアドレス</label>
            <div class="col-sm-10">
                <textarea class="form-control" id="input-content" rows="5"></textarea>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">問い合わせ送信</button>
    </form>
</main>
<footer class="flex-shrink-1">
    <div class="container">
        <small>Copyright &copy; 2022- ミライズ. All Rights Reserved.</small>
    </div>
</footer>
</body>
</html>
